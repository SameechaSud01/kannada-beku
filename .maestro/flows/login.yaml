# AUTH-02: email/password login lands in the app.
# Requires MAESTRO_TEST_EMAIL / MAESTRO_TEST_PASSWORD for an already-onboarded account.
appId: com.samsud01.kannadabeku
---
- launchApp:
    clearState: true
- assertVisible: 'Welcome back'
- tapOn: 'Email'
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: 'Password'
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn: 'Log in'
# Logged in + onboarded → tabs. The floating tab bar exposes these labels.
- extendedWaitUntil:
    visible: 'Learn'
    timeout: 15000
- assertVisible: 'Home'
- assertVisible: 'Profile'
