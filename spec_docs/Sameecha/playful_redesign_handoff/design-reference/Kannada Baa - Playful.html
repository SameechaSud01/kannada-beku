<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kannada Baa — Playful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+Kannada:wght@400;500;600;700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #e8e6d8; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { width: 100vw; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    @keyframes pl-fall { 0% { transform: translateY(-30px) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(620px) rotate(380deg); opacity: 0; } }
    @keyframes pl-rise { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    @keyframes pl-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pl-bar { 0% { width: 4%; } 100% { width: 100%; } }
    @keyframes pl-ring { from { stroke-dashoffset: var(--from); } to { stroke-dashoffset: var(--to); } }
    @keyframes pl-flame { 0%,100% { transform: rotate(0deg) scale(1); } 30% { transform: rotate(-7deg) scale(1.14); } 60% { transform: rotate(6deg) scale(1.07); } }
    @keyframes pl-slidein { from { opacity: 0; transform: translateX(22px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pl-page { from { opacity: 0; transform: translateY(8px) scale(0.992); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pl-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(3px); } }
    @keyframes pl-bounce { 0% { transform: scale(1); } 40% { transform: scale(1.04); } 70% { transform: scale(0.99); } 100% { transform: scale(1); } }
    @keyframes pl-float { 0% { transform: translateY(0) scale(0.6); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(-40px) scale(1.1); opacity: 0; } }
    @keyframes pl-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pl-pop { 0% { opacity: 0; transform: scale(0.4); } 60% { transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pl-ping { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 0; transform: scale(1.4); } }
    @keyframes pl-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes pl-wave { 0%,100% { transform: rotate(0deg); } 20% { transform: rotate(16deg); } 40% { transform: rotate(-8deg); } 60% { transform: rotate(12deg); } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="pl-system.jsx"></script>
  <script type="text/babel" src="pl-home.jsx"></script>
  <script type="text/babel" src="pl-lesson.jsx"></script>
  <script type="text/babel" src="pl-emergency.jsx"></script>
  <script type="text/babel" src="pl-auth.jsx"></script>
  <script type="text/babel" src="pl-app.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#a30420"/>
      <text x="50" y="66" font-size="48" text-anchor="middle" fill="#fdc003" font-family="'Baloo Tamma 2',sans-serif" font-weight="800">ಬಾ</text>
    </svg>
  </template>
</body>
</html>
