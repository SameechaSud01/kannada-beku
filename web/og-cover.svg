<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(27,29,14,0.05)"/>
      <stop offset="60%" stop-color="rgba(27,29,14,0.05)"/>
      <stop offset="61%" stop-color="transparent"/>
    </radialGradient>
    <pattern id="kolam" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.4" fill="rgba(27,29,14,0.05)"/>
    </pattern>
    <linearGradient id="lip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#91001b"/>
      <stop offset="100%" stop-color="#be0027"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#faf6ea"/>
  <rect width="1200" height="630" fill="url(#kolam)"/>

  <!-- brand mark -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="150" height="140" rx="34" fill="url(#lip)"/>
    <rect x="0" y="122" width="150" height="20" rx="10" fill="#6e0014"/>
    <text x="75" y="108" font-family="'Baloo Tamma 2','Noto Sans Kannada',system-ui,sans-serif"
          font-size="110" font-weight="800" fill="#ffffff" text-anchor="middle">ಕ</text>
  </g>

  <!-- eyebrow -->
  <g transform="translate(290,178)">
    <rect x="0" y="-10" width="26" height="4" rx="2" fill="#91001b"/>
    <text x="40" y="-2" font-family="'DM Sans',system-ui,sans-serif" font-size="22" font-weight="700"
          letter-spacing="3" fill="#91001b">COMING SOON · iOS &amp; ANDROID</text>
  </g>

  <!-- wordmark -->
  <text x="290" y="262" font-family="'Baloo Tamma 2',system-ui,sans-serif" font-size="64" font-weight="800"
        letter-spacing="-1" fill="#1b1d0e">Kannada Beku</text>

  <!-- headline -->
  <text font-family="'Baloo Tamma 2',system-ui,sans-serif" font-weight="800" letter-spacing="-1.5" fill="#1b1d0e">
    <tspan x="96" y="400" font-size="72">Learn the <tspan fill="#91001b">Kannada</tspan> that</tspan>
    <tspan x="96" y="478" font-size="72">Bengaluru actually speaks.</tspan>
  </text>

  <!-- subline -->
  <text x="96" y="548" font-family="'DM Sans',system-ui,sans-serif" font-size="30" font-weight="500" fill="#464646">
    Short lessons, real survival phrases, and the culture behind the words.
  </text>

  <!-- domain pill -->
  <g transform="translate(96,576)">
    <rect x="0" y="0" width="252" height="44" rx="22" fill="#1b1d0e"/>
    <text x="126" y="29" font-family="'DM Sans',system-ui,sans-serif" font-size="20" font-weight="700"
          fill="#ffdf9e" text-anchor="middle">kannadabeku.com</text>
  </g>
</svg>
