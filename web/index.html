  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; padding: 0; background: #faf6ea; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    #root { width: 100%; min-height: 100vh; }
    a { -webkit-tap-highlight-color: transparent; }

    @keyframes kb-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    /* Respect users who ask for less motion — kill the bob + smooth scroll */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    }

    /* layout */
    .kb-hero { display: grid; grid-template-columns: 1.04fr 0.96fr; gap: 52px; align-items: center; }
    .kb-shots { display: flex; gap: 40px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }

    /* "What's inside" — stats band */
    .kb-stats { display: grid; grid-template-columns: repeat(3, 1fr); }
    .kb-stats > div { padding: 8px 32px; position: relative; text-align: center; }
    .kb-stats > div + div::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 1px; background: rgba(27,29,14,0.10); }
    /* single-phone walkthrough + feature cards */
    .kb-walk { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 60px; align-items: center; }
    .kb-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .kb-about { display: grid; grid-template-columns: 1.08fr 0.92fr; gap: 56px; align-items: center; }
    .kb-story { display: grid; grid-template-columns: 1.06fr 0.94fr; gap: 56px; align-items: center; }
    .kb-bridges { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 40px; }
    .kb-contact { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
    .kb-foot { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; }
    /* section gutters — overridden tighter on small screens (see media queries) */
    .kb-wrap { /* padding set inline per-section; only L/R is narrowed on mobile */ }

    @media (max-width: 940px) {
      .kb-hero { grid-template-columns: 1fr; gap: 48px; }
      .kb-about { grid-template-columns: 1fr; gap: 36px; }
      .kb-story { grid-template-columns: 1fr; gap: 40px; }
      .kb-walk { grid-template-columns: 1fr; gap: 44px; }
    }
    @media (max-width: 860px) {
      .kb-stats { grid-template-columns: 1fr 1fr; row-gap: 34px; }
      .kb-stats > div { padding: 4px 24px; }
      .kb-stats > div:nth-child(odd)::before { display: none; }
      .kb-cards { grid-template-columns: 1fr; }
      .kb-bridges { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .kb-contact { grid-template-columns: minmax(0, 1fr); }
      /* !important beats the inline shorthand padding; vertical values are kept */
      .kb-wrap { padding-left: 20px !important; padding-right: 20px !important; }
    }
    @media (max-width: 480px) {
      .kb-stats { grid-template-columns: 1fr; }
      .kb-stats > div::before { display: none !important; }
      .kb-stats > div { padding: 4px 8px; }
      .kb-wrap { padding-left: 16px !important; padding-right: 16px !important; }
    }
  </style>
